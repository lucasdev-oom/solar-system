name: Solar System CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: solar-system
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Unit Tests
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          # Add your real test commands here, e.g.:
          # php -r "echo 'Tests passed';"

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          TAG="${{ github.run_number }}-${{ github.sha }}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.image_tag }} .

      - name: Push Docker image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.image_tag }} \
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.image_tag }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.image_tag }}

  # ─────────────────────────────────────────────
  # JOB 3: Update GitOps Repo (triggers ArgoCD)
  # ─────────────────────────────────────────────
  update-gitops-repo:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: lucasdev-oom/gitops-argocd
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-argocd

      - name: Update image tag in deployment.yml
        run: |
          NEW_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/solar-system:${{ needs.build-and-push.outputs.image_tag }}"
          sed -i "s|image:.*|image: ${NEW_IMAGE}|g" gitops-argocd/solar-system/deployment.yml
          echo "Updated deployment.yml with image: ${NEW_IMAGE}"
          cat gitops-argocd/solar-system/deployment.yml

      - name: Commit and push changes
        run: |
          cd gitops-argocd
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add solar-system/deployment.yml
          git commit -m "ci: update solar-system image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push origin main
